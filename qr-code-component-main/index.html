<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | QR code component</title>

  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</head>

<body>
  <div class="container d-flex justify-content-center align-items-center vh-100 vw-100">

    <div class="container-fluid card text-center" style="width: 18rem; padding: 1rem; border-radius: 20px;">

      <img src="./images/image-qr-code.png" class="card-img-top" style="border-radius: 10px;" alt="QR code image">

      <div class="card-body">

        <h4 class="card-title" style="font-size: large; text-align: center;">Improve your front-end skills by building projects</h4>
        <p class="card-text" style="font-size: small; text-align: center;">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
        </p>
      </div>

    </div>

  </div>

</body>

</html>
